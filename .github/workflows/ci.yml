name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install fish
        run: |
          sudo apt-get update
          sudo apt-get install -y fish

      - name: Fish syntax check
        run: |
          while IFS= read -r -d '' file; do
            fish -n "$file"
          done < <(find config/fish -type f -name '*.fish' -print0)

      - name: Stylua format (LazyVim)
        uses: JohnnyMorganz/stylua-action@v4
        with:
          token: ${{ github.token }}
          version: latest
          args: config/lazyvim
