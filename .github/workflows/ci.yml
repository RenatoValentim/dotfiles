name: ci

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install runtime dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y fish lua5.4

      - name: Install Stylua
        uses: taiki-e/install-action@v2
        with:
          tool: stylua

      - name: Run validation script
        run: ./scripts/check.sh
